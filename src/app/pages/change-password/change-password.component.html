<div class="password-page" dir="rtl">
  <section class="password-card">
    <div class="brand">
      <div class="logo-big">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          <path d="M9 10V7a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M12 15v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>تغيير كلمة السر</h1>
      <p>يجب تحديث كلمة السر قبل متابعة استخدام النظام</p>
    </div>

    <div class="user-strip">
      <span>المستخدم</span>
      <strong>{{ user()?.username }}</strong>
    </div>

    <form (ngSubmit)="submit()" autocomplete="off">
      <label>
        <span>كلمة السر الحالية</span>
        <input
          [type]="showPasswords() ? 'text' : 'password'"
          name="currentPassword"
          [ngModel]="currentPassword()"
          (ngModelChange)="currentPassword.set($event)"
          autocomplete="current-password"
          dir="ltr"
          [disabled]="loading()"
        />
      </label>

      <label>
        <span>كلمة السر الجديدة</span>
        <input
          [type]="showPasswords() ? 'text' : 'password'"
          name="newPassword"
          [ngModel]="newPassword()"
          (ngModelChange)="newPassword.set($event)"
          autocomplete="new-password"
          dir="ltr"
          [disabled]="loading()"
        />
      </label>

      <label>
        <span>تأكيد كلمة السر الجديدة</span>
        <input
          [type]="showPasswords() ? 'text' : 'password'"
          name="confirmPassword"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          autocomplete="new-password"
          dir="ltr"
          [disabled]="loading()"
        />
      </label>

      <label class="check-row">
        <input
          type="checkbox"
          [ngModel]="showPasswords()"
          (ngModelChange)="showPasswords.set($event)"
          name="showPasswords"
        />
        <span>إظهار كلمات السر</span>
      </label>

      @if (error()) {
        <div class="error-box">{{ error() }}</div>
      }

      @if (success()) {
        <div class="success-box">{{ success() }}</div>
      }

      <button type="submit" class="submit-btn" [disabled]="loading()">
        {{ loading() ? 'جاري الحفظ...' : 'تغيير كلمة السر' }}
      </button>
    </form>

    <button type="button" class="logout-btn" (click)="logout()" [disabled]="loading()">
      تسجيل خروج
    </button>
  </section>
</div>
